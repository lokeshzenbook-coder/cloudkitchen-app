# =============================================================================
# Traefik IngressRoute exposing Prometheus at  http://<host>/prometheus/
# Backend: kube-prometheus-prometheus:9090
#
# Note: the Prometheus chart values set
#   prometheus.prometheusSpec.routePrefix: /prometheus
#   prometheus.prometheusSpec.externalUrl: http://vijaygiduthuri.in/prometheus
# so Prometheus's internal redirects + alert links are /prometheus-prefixed.
# Don't add StripPrefix here.
#
# Apply:
#   kubectl apply -f monitoring/ingressroutes/prometheus.yaml
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  entryPoints:
    - web
  routes:
    - match: (Host(`vijaygiduthuri.in`) || Host(`35.224.38.103`)) && PathPrefix(`/prometheus`)
      kind: Rule
      services:
        - name: kube-prometheus-prometheus
          port: 9090
