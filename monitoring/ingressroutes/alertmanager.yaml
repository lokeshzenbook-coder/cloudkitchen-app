# =============================================================================
# Traefik IngressRoute exposing Alertmanager at  http://<host>/alertmanager/
# Backend: kube-prometheus-alertmanager:9093
#
# Note: alertmanager.alertmanagerSpec.routePrefix is /alertmanager in our
# chart values (argocd/apps/app-monitoring.yaml). So Alertmanager itself
# expects to be served at /alertmanager — don't add StripPrefix.
#
# Apply:
#   kubectl apply -f monitoring/ingressroutes/alertmanager.yaml
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: alertmanager
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  entryPoints:
    - web
  routes:
    - match: (Host(`vijaygiduthuri.in`) || Host(`35.224.38.103`)) && PathPrefix(`/alertmanager`)
      kind: Rule
      services:
        - name: kube-prometheus-alertmanager
          port: 9093
