  name: cloudkitchen-ingress
  namespace: cloudkitchen
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: cloudkitchen.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
