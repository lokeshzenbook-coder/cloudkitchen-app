name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  security:
    name: Security (${{ matrix.service }})
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - restaurant-service
          - menu-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Gitleaks Secret Scan
      # -------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # Dockerfile Lint
      # -------------------------
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ./${{ matrix.service }}/Dockerfile

  docker-build:
    name: Build & Push (${{ matrix.service }})
    needs: security
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - restaurant-service
          - menu-service
          - order-service
          - payment-service
          - delivery-service
          - notification-service
          - frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Short SHA
        id: vars
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # -------------------------
      # Build Image (Local)
      # -------------------------
      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # -------------------------
      # Cache Trivy Database
      # -------------------------
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
          restore-keys: |
            trivy-db-

      # -------------------------
      # Trivy Scan
      # -------------------------
      - name: Scan Docker Image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
          scan-type: image
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          skip-version-check: true

      # -------------------------
      # Upload SARIF Report
      # -------------------------
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      # -------------------------
      # Push Docker Image
      # -------------------------
      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}